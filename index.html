<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor TechSpecs</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #eef2f5;
        }
        
        .fondo-cabecera {
            background-color: #2c3e50;
        }

        .identidad-principal {
            background-image: linear-gradient(rgba(44, 62, 80, 0.75), rgba(44, 62, 80, 0.75)), 
                              url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?q=80&w=1200');
            background-size: cover;
            background-position: center;
            height: 160px;
        }

        .sombra-panel {
            box-shadow: 0 10px 25px rgba(44, 62, 80, 0.08) !important;
        }

        .boton-guardar {
            background-color: #2ecc71;
            border-color: #2ecc71;
            color: white;
        }

        .boton-guardar:hover {
            background-color: #27ae60;
            border-color: #27ae60;
            color: white;
        }

        .tarjeta-personalizada {
            background-color: #fdfdfd;
            border: 1px solid #e2e8f0;
            border-left: 5px solid #2ecc71;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .tarjeta-personalizada:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(44, 62, 80, 0.08);
        }
    </style>
</head>
<body>

    <header class="fondo-cabecera text-white text-center py-4 shadow-sm">
        <h1 class="m-0 fw-bold">Gestor TechSpecs</h1>
    </header>

    <section class="identidad-principal d-flex align-items-center justify-content-center text-center text-white">
        <div>
            <h2 class="fs-3 fw-semibold m-0">Gestión Avanzada de Infraestructura</h2>
            <p class="text-white-50 m-0 mt-1">Configuración y monitorización de servidores en tiempo real.</p>
        </div>
    </section>

    <main class="container py-5">
        <div class="row g-4">
            
            <section class="col-12 col-md-6">
                <div class="card p-4 border-0 h-100 sombra-panel">
                    <h2 class="fs-5 border-bottom pb-2 mb-4 text-secondary">Añadir Nuevo Servidor</h2>
                    <form id="formularioServidor">
                        <div class="mb-3">
                            <label for="nombreServidor" class="form-label fw-semibold text-muted">Nombre del servidor:</label>
                            <input type="text" class="form-control" id="nombreServidor" placeholder="Ej. DB-Prod-01" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="procesador" class="form-label fw-semibold text-muted">CPU (Núcleos):</label>
                            <input type="number" class="form-control" id="procesador" min="2" placeholder="Mínimo 2" required>
                        </div>
                        
                        <div class="mb-3">
                            <label interpreter="ram" for="memoria" class="form-label fw-semibold text-muted">RAM (GB):</label>
                            <input type="number" class="form-control" id="memoria" min="4" placeholder="Mínimo 4" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="almacenamiento" class="form-label fw-semibold text-muted">Almacenamiento:</label>
                            <select class="form-select" id="almacenamiento" required>
                                <option value="" disabled selected>Selecciona un tipo...</option>
                                <option value="SSD">SSD</option>
                                <option value="HDD">HDD</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn boton-guardar w-100 fw-bold py-2 shadow-sm">Guardar Configuración</button>
                    </form>
                </div>
            </section>

            <section class="col-12 col-md-6">
                <div class="card p-4 border-0 h-100 sombra-panel">
                    <h2 class="fs-5 border-bottom pb-2 mb-4 text-secondary">Servidores Registrados</h2>
                    
                    <div class="row row-cols-1 g-3" id="contenedorTarjetas">
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        const URL_API = 'http://localhost:3000/servidores';
        const formulario = document.getElementById('formularioServidor');
        const contenedor = document.getElementById('contenedorTarjetas');

        async function obtenerServidores() {
            try {
                const respuesta = await fetch(URL_API);
                if (!respuesta.ok) throw new Error();
                const datos = await respuesta.json();
                renderizarTarjetas(datos);
            } catch (error) {
                contenedor.innerHTML = `<div class="col-12"><p class="text-danger small">Asegúrate de ejecutar json-server en tu terminal: npx json-server --watch db.json --port 3000</p></div>`;
            }
        }

        function renderizarTarjetas(servidores) {
            contenedor.innerHTML = '';
            if(servidores.length === 0) {
                contenedor.innerHTML = '<div class="col-12"><p class="text-muted small">No hay servidores registrados actualmente.</p></div>';
                return;
            }
            servidores.forEach(s => {
                contenedor.innerHTML += `
                    <div class="col">
                        <article class="card tarjeta-personalizada p-3">
                            <div class="d-flex align-items-center gap-3 mb-3">
                                <img src="https://picsum.photos/60?random=${s.id}" alt="Foto de perfil del registro" class="rounded-circle shadow-sm" width="60" height="60">
                                <div>
                                    <h3 class="fs-6 fw-bold text-dark m-0">${s.nombre}</h3>
                                </div>
                            </div>
                            <div class="small text-muted mb-3 ps-1">
                                <p class="m-0"><strong>CPU:</strong> ${s.cpu} Núcleos</p>
                                <p class="m-0"><strong>RAM:</strong> ${s.ram} GB</p>
                                <p class="m-0"><strong>Disco:</strong> ${s.almacenamiento}</p>
                            </div>
                            <button class="btn btn-danger btn-sm w-100 fw-bold" onclick="eliminarServidor('${s.id}')">Eliminar</button>
                        </article>
                    </div>`;
            });
        }

        formulario.addEventListener('submit', async (e) => {
            e.preventDefault();
            const cpu = parseInt(document.getElementById('procesador').value);
            const ram = parseInt(document.getElementById('memoria').value);
            
            const costo = (cpu * 50) + (ram * 20);
            
            if (costo > 700) {
                alert(`Error: El presupuesto supera los 700€.\nCosto estimado: ${costo}€`);
                return;
            }

            const nuevoServidor = {
                nombre: document.getElementById('nombreServidor').value,
                cpu,
                ram,
                almacenamiento: document.getElementById('almacenamiento').value
            };

            try {
                await fetch(URL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoServidor)
                });
                formulario.reset();
                obtenerServidores();
            } catch (error) {
                alert('No se pudo guardar la configuración.');
            }
        });

        async function eliminarServidor(id) {
            try {
                await fetch(`${URL_API}/${id}`, { method: 'DELETE' });
                obtenerServidores();
            } catch (error) {
                alert('Error al intentar eliminar el servidor.');
            }
        }

        obtenerServidores();
    </script>
</body>
</html>
